version: '3.8'

services:
  model:
    image: voa2000/house-price-model:dev 
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    container_name: model-app
    networks:
      - house-price-network

  streamlit:
    image: voa2000/streamlit:dev 
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    container_name: streamlit-app
    environment:
      API_URL: http://model:8000
    depends_on:
      - model
    networks:
      - house-price-network

networks:
  house-price-network:
    name: house-price-network