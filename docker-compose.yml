version: '3.8'

services:
  house-price-model:
    image: voa2000/house-price-model:dev 
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    container_name: house-price-model-app

  streamlit:
    image: voa2000/streamlit:dev 
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    container_name: streamlit-app
    environment:
      API_URL: http://model:8000
    depends_on:
      - house-price-model 