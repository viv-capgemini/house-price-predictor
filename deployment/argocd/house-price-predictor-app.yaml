apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: house-price-predictor
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/viv-capgemini/house-price-predictor.git
    targetRevision: main
    path: deployment/kubernetes
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
