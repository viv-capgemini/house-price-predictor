apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: model
  name: model
  namespace: house-price-predictor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: model
  strategy: {}
  template:
    metadata:
      labels:
        app: model
    spec:
      containers:
      - image: voa2000/streamlit:latest
        name: house-price-model
        ports:
        - containerPort: 8501
        resources: {}
status: {}
