apiVersion: v1
kind: Service
metadata:
  name: {{ include "model.fullname" . }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "model.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: {{ .Values.service.metricsPort }}

