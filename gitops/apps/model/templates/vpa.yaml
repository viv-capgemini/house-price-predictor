{{- if .Values.autoscaling.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Values.autoscaling.vpa.name }}
  labels:
    app: {{ include "model.name" . }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "model.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.autoscaling.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: {{ .Values.autoscaling.vpa.minAllowed.cpu | quote }}
          memory: {{ .Values.autoscaling.vpa.minAllowed.memory | quote }}
        maxAllowed:
          cpu: {{ .Values.autoscaling.vpa.maxAllowed.cpu | quote }}
          memory: {{ .Values.autoscaling.vpa.maxAllowed.memory | quote }}
        controlledResources:
{{ toYaml .Values.autoscaling.vpa.controlledResources | nindent 10 }}
{{- end }}
