name: Streamlit CI Pipeline

permissions:
  contents: write
  
on:
  push:
    branches: [ dev ]
    paths:
      - 'streamlit_app/**'
      - .github/workflows/streamlit-ci.yaml
  workflow_dispatch:

jobs:
#---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r streamlit_app/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 streamlit_app/ --max-line-length=120
#---------------------------------------------------------------
  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: streamlit-
          default_bump: patch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Streamlit image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./streamlit_app
          file: ./streamlit_app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hpp-streamlit:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hpp-streamlit:${{ steps.tag.outputs.new_tag }}
#---------------------------------------------------------------
  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          path: gitops

      - name: Update Streamlit Helm chart values.yaml with tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops/gitops/apps/streamlit
          yq -i '.image.tag = env(IMAGE_TAG)' values.yaml

      - name: Commit and push changes to GitOps repo
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin dev
          git checkout dev
          git pull --rebase origin dev
          git add .
          git commit -m "chore: update Streamlit image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push origin dev
