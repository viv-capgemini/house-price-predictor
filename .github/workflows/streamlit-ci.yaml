name: Streamlit CI Pipeline
on:
  push:
    paths:
      - 'streamlit_app/**'
      - .github/workflows/streamlit-ci.yml
  workflow_dispatch:

jobs:
 build-and-push:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Streamlit image (amd64 + arm64)
      uses: docker/build-push-action@v6
      with:
          context: ./streamlit_app
          file: ./streamlit_app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/streamlit:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/streamlit:v1.0.1
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/streamlit:${{ github.sha }}