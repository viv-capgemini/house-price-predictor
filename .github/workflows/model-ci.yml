name: Model CI Pipeline

on:
  push:
    paths:
      - src/api/**
      - models/trained/**
      - .github/workflows/model-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-model-api:
    name: Test model API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: pip install -r src/api/requirements.txt

      - name: Compile API sources
        run: python -m compileall src/api

      - name: Smoke test model load and FastAPI app
        env:
          PYTHONPATH: src/api
        run: |
          python -c "import inference; from main import app; assert app.title == 'House Price Prediction API'"

  publish-model-image:
    name: Build and publish model image
    runs-on: ubuntu-latest
    needs: test-model-api
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/house-price-model
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
