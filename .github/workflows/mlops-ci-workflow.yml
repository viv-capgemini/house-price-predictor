name: MLOps CI 

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.5'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install  -r requirements.txt

    - name: Ensure model config exists
      run: |
        mkdir -p configs
        cat > configs/model_config.yaml <<'EOF'
        model:
          name: house_price_predictor
          best_model: RandomForest
          target_variable: price
          parameters:
            n_estimators: 100
            max_depth: 20
            random_state: 42
        EOF

    - name: Run Data Processing Tests
      run: |
        python src/data/run_processing.py \
          --input data/raw/house_data.csv   \
          --output data/processed/cleaned_house_data.csv

    - name: Run Feature Engineering Tests
      run: |
        python src/features/engineer.py   \
          --input data/processed/cleaned_house_data.csv   \
          --output data/processed/featured_house_data.csv   \
          --preprocessor models/trained/preprocessor.pkl
    
    - name: Setup MLflow Tracking Server
      run: |
        docker pull ghcr.io/mlflow/mlflow:latest
        docker run -d -p 5555:5000              \
        --name mlflow-server ghcr.io/mlflow/mlflow:latest \
        mlflow server --host 0.0.0.0 \
        --backend-store-uri sqlite:///mlflow.db \
        --default-artifact-root /tmp/mlruns

    - name: Run Training and experiment
      run: |
        python src/models/train_model.py   \
        --config configs/model_config.yaml   \
        --data data/processed/featured_house_data.csv   \
        --models-dir models/trained/   \
        --mlflow-tracking-uri http://localhost:5555
    
    - name: Cleanup MLflow Server
      run: |
        docker stop mlflow-server
        docker rm mlflow-server
        docker rmi ghcr.io/mlflow/mlflow:latest

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
          context: .
          file: ./Dockerfile
          push: true
          tags: voa2000/fastapi:${{ github.sha }}
